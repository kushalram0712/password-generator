<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIST Secure Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="card">
        <h1>Secure Generator</h1>
        
        <div class="controls">
            <label for="length">Password Length: <span id="lenVal">16</span></label>
            <input type="range" id="length" min="8" max="64" value="16">
        </div>
        
        <div class="password-display" id="result">Click Generate</div>
        
        <button class="btn" id="generateBtn">Generate New Password</button>
        <button class="btn" id="copyBtn" style="margin-top: 10px; background-color: #636e72;">Copy to Clipboard</button>
        
        <div class="meta-info">
            <span id="entropy">Entropy: 0 bits</span>
            <span id="copyStatus"></span>
        </div>
    </div>
</body>
</html>
