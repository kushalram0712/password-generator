<div class="container" style="font-family: sans-serif; max-width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
    <h2>Secure Password Generator</h2>
    
    <div>
        <label>Length: <span id="lenVal">16</span></label><br>
        <input type="range" id="length" min="8" max="64" value="16" oninput="document.getElementById('lenVal').innerText = this.value">
    </div>
    
    <button onclick="generate()" style="margin-top: 10px; padding: 10px; width: 100%;">Generate</button>
    
    <div style="margin: 20px 0; padding: 15px; background: #f4f4f4; word-break: break-all; font-family: monospace;" id="result">---</div>
    
    <button onclick="copyToClipboard()" style="padding: 10px; width: 100%;">Copy to Clipboard</button>
    <p id="copyStatus" style="text-align: center; color: green; font-size: 0.8em;"></p>
</div>
